<!DOCTYPE html><html lang="en"><head>
<meta property="og:title" content="Keycode Info — DevKit">
<meta property="og:description" content="Free online Keycode Info tool — fast, simple, and no signup required.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://479464887-rgb.github.io/keycode-info/">
<meta name="twitter:card" content="summary">
<link rel="canonical" href="https://479464887-rgb.github.io/keycode-info/">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠</text></svg>">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="Press any key to see its keyCode, code, key, and modifiers"><title>Keycode Info — DevKit Tools</title><style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--text2:#8b949e;--accent:#58a6ff;--yellow:#f0c040;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px;text-align:center;max-width:500px;}
h1{font-size:20px;color:#f0f6fc;margin-bottom:8px;}
.prompt{color:var(--text2);font-size:14px;margin-bottom:24px;}
.key-display{font-size:64px;font-weight:700;color:var(--yellow);background:var(--bg);border-radius:16px;padding:24px;margin-bottom:20px;min-height:120px;display:flex;align-items:center;justify-content:center;}
.info{display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:left;font-size:13px;}
.info div{background:var(--bg);padding:8px 12px;border-radius:6px;}
.info .label{font-size:11px;color:var(--text2);}
.info .value{font-size:16px;font-weight:600;color:var(--accent);}
.history{display:flex;gap:4px;margin-top:16px;flex-wrap:wrap;justify-content:center;}
.history span{background:var(--bg);padding:4px 8px;border-radius:4px;font-size:12px;font-family:monospace;color:var(--text2);}
/* 响应式设计 */
@media (max-width: 768px) {
  body { padding: 12px; }
  header { padding: 12px 16px; flex-direction: column; }
  .container { max-width: 100%; padding: 0 8px; }
  h1 { font-size: 1.5rem; }
  textarea, input, select, button { width: 100%; }
  .grid { grid-template-columns: 1fr; }
  .card { padding: 12px; }
}</style></head><body>
<div class="card"><h1>⌨️ Keycode Info</h1><p class="prompt">Press any key on your keyboard</p>
<div class="key-display" id="key">⌨️</div>
<div class="info" id="info"><div><div class="label">key</div><div class="value">-</div></div><div><div class="label">code</div><div class="value">-</div></div><div><div class="label">keyCode</div><div class="value">-</div></div><div><div class="label">which</div><div class="value">-</div></div><div><div class="label">shift</div><div class="value">-</div></div><div><div class="label">ctrl</div><div class="value">-</div></div><div><div class="label">alt</div><div class="value">-</div></div><div><div class="label">meta</div><div class="value">-</div></div></div>
<div class="history" id="history"></div></div>
<script>
const keys=[];
document.addEventListener('keydown',e=>{
  e.preventDefault();
  const k=e.key===' '?'Space':e.key;
  document.getElementById('key').textContent=k;
  document.getElementById('info').innerHTML=`<div><div class="label">key</div><div class="value">${e.key}</div></div><div><div class="label">code</div><div class="value">${e.code}</div></div><div><div class="label">keyCode</div><div class="value">${e.keyCode}</div></div><div><div class="label">which</div><div class="value">${e.which}</div></div><div><div class="label">shift</div><div class="value">${e.shiftKey}</div></div><div><div class="label">ctrl</div><div class="value">${e.ctrlKey}</div></div><div><div class="label">alt</div><div class="value">${e.altKey}</div></div><div><div class="label">meta</div><div class="value">${e.metaKey}</div></div>`;
  keys.unshift(k);if(keys.length>10)keys.pop();
  document.getElementById('history').innerHTML=keys.map(k=>`<span>${k}</span>`).join('');
});
</script></body></html>
